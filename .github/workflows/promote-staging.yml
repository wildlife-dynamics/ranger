name: Promote staging to main

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  open-promotion-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Verify staging is ahead of main
        run: |
          git fetch origin main
          AHEAD=$(git rev-list --count origin/main..HEAD)
          if [ "$AHEAD" -eq 0 ]; then
            echo "::error::staging is not ahead of main — nothing to promote"
            exit 1
          fi
          echo "staging is $AHEAD commit(s) ahead of main"

      - name: Build PR body
        run: |
          {
            echo "## Promote staging to main"
            echo
            echo "Auto-generated by the \`Promote staging to main\` workflow."
            echo
            echo "### Commits"
            echo
            git log origin/main..HEAD --pretty=format:'- %h %s' --no-merges
            echo
            echo
            echo "### Pull requests included"
            echo
            PRS=$(git log origin/main..HEAD --pretty=format:'%s%n%b' \
                  | grep -oE '#[0-9]+' | sort -u)
            if [ -z "$PRS" ]; then
              echo "_None detected._"
            else
              echo "$PRS" | sed 's/^/- /'
            fi
          } > pr-body.md
          cat pr-body.md

      - name: Open or update promotion PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh pr list --base main --head staging --state open \
                       --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Updating existing PR #$EXISTING"
            gh pr edit "$EXISTING" --body-file pr-body.md
            gh pr view "$EXISTING" --json url --jq .url
          else
            echo "Creating new PR"
            gh pr create --base main --head staging \
              --title "Promote staging to main" \
              --body-file pr-body.md
          fi
